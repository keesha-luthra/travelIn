name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: 🔒 Security Scan
        run: npm run security

      - name: 🧹 Lint Code
        run: npm run lint

      - name: 🏷️ Type Check
        run: npm run typecheck

      - name: 🏗️ Build & Asset Validation
        run: npm run build
